# Application
spring.application.name=digital-repository-platform
server.port=8080

# MySQL Database — update credentials for your environment
spring.datasource.url=jdbc:mysql://localhost:3306/drp_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
drp.file.upload-dir=uploads
drp.file.allowed-types=application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain,image/jpeg,image/png

# Logging
logging.level.com.drp=DEBUG
logging.level.org.springframework.security=INFO

# JWT (Base64-encoded 256-bit secret — change in production)
drp.jwt.secret=ZHJwLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1zaWduaW5nLTIwMjQ=
drp.jwt.expiration-ms=86400000

# Seed admin user (created on first startup if not exists)
drp.seed.admin.username=admin
drp.seed.admin.password=admin123
drp.seed.admin.email=admin@drp.local
